<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>রকেট পেমেন্ট গেটওয়ে | Sotota Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .rocket-gradient { background: linear-gradient(135deg, #8c3494 0%, #5a1a61 100%); }
        
        .toast-custom {
            visibility: hidden; min-width: 250px; background: #1F2937; color: white;
            text-align: center; border-radius: 50px; padding: 12px; position: fixed;
            z-index: 1000; bottom: 30px; left: 50%; transform: translateX(-50%);
            opacity: 0; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .toast-custom.show { visibility: visible; opacity: 1; }
        
        .loading-spinner {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .banner-container::-webkit-scrollbar { display: none; }
        .banner-img { 
            width: 150px; height: 90px; object-fit: cover; border-radius: 12px; 
            flex-shrink: 0; border: 1px solid #ddd;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start sm:justify-center min-h-screen p-2 bg-gray-50">

    <div class="max-w-md w-full bg-white rounded-[35px] shadow-2xl overflow-hidden mt-2">
        
        <div class="rocket-gradient p-6 text-white flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/1017/1017599.png" class="w-7 h-7 object-contain">
                </div>
                <div>
                    <h1 class="font-bold text-lg">রকেট পেমেন্ট</h1>
                    <p class="text-[10px] opacity-80 uppercase tracking-widest">Sotota Shop Official</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-80 uppercase">পরিমাণ</p>
                <h2 class="text-2xl font-black">৳ <span id="display-amount">0</span></h2>
            </div>
        </div>

        <div class="p-6">
            <div class="bg-gray-50 rounded-xl p-3 mb-5 flex justify-between text-xs border border-gray-100">
                <span class="text-gray-500">অর্ডার আইডি: <b id="order-id" class="text-gray-800">-</b></span>
                <span class="text-purple-700 font-bold">রকেট পার্সোনাল</span>
            </div>

            <div class="mb-5">
                <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">পেমেন্ট ধাপগুলো দেখুন</label>
                <div id="banner-list" class="flex gap-3 overflow-x-auto banner-container pb-1">
                    <div class="banner-img bg-gray-100 animate-pulse"></div>
                    <div class="banner-img bg-gray-100 animate-pulse"></div>
                </div>
            </div>

            <div class="bg-purple-50 border-l-4 border-purple-600 p-3 rounded-r-xl mb-6">
                <p class="text-xs text-gray-700 leading-tight">
                    নিচের নম্বরে <span class="font-bold text-purple-700">Send Money</span> করুন। এরপর ট্রানজেকশন আইডি (TrxID) দিয়ে সাবমিট দিন।
                </p>
            </div>

            <div class="text-center mb-8">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">রকেট পার্সোনাল নম্বর</label>
                <div class="bg-purple-50/50 border-2 border-dashed border-purple-200 rounded-[25px] p-5">
                    <span id="display-number" class="text-4xl font-black text-gray-800 tracking-tighter block mb-3">লোড হচ্ছে...</span>
                    
                    <button onclick="copyNumber()" class="inline-flex items-center gap-2 bg-[#8c3494] hover:bg-[#702a76] text-white px-5 py-2 rounded-full text-xs font-bold shadow-md active:scale-95 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                        নম্বর কপি করুন
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1 block mb-1">Transaction ID (TrxID)</label>
                    <input type="text" id="trx-input" placeholder="8N7A9X2K5L" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl text-center font-mono font-bold text-xl uppercase focus:border-purple-600 outline-none">
                </div>
                
                <button id="submit-btn" onclick="sendPayment()" class="w-full rocket-gradient text-white font-bold py-4 rounded-2xl shadow-lg uppercase text-sm active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    পেমেন্ট নিশ্চিত করুন
                </button>
            </div>
        </div>

        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest leading-none">🔒 SSL Secured • Sotota Shop</p>
        </div>
    </div>

    <div id="toastMsg" class="toast-custom font-bold"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBiG7ssePTyaKavznWmQsdpAq4Q2NUWyeA",
            authDomain: "my-app-7e2b8.firebaseapp.com",
            databaseURL: "https://my-app-7e2b8-default-rtdb.firebaseio.com",
            projectId: "my-app-7e2b8",
            storageBucket: "my-app-7e2b8.firebasestorage.app",
            messagingSenderId: "683941019095",
            appId: "1:683941019095:web:6a82c99ca567aada679f92"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || "0";
        const orderId = urlParams.get('orderId');
        
        document.getElementById('display-amount').innerText = amount;
        if(orderId) document.getElementById('order-id').innerText = orderId.substring(0, 10);

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.style.background = isError ? "#ef4444" : "#1F2937";
            toast.className = "toast-custom show";
            setTimeout(() => { toast.className = "toast-custom"; }, 2500);
        }

        // রকেট নম্বর লোড
        db.collection("settings").doc("rocket").onSnapshot((doc) => {
            const numEl = document.getElementById('display-number');
            if(doc.exists && doc.data().number) {
                numEl.innerText = doc.data().number;
            } else {
                numEl.innerText = "নম্বর পাওয়া যায়নি";
            }
        });

        // ব্যানার লোড করার অংশ (এটি আগে মিসিং ছিল)
        db.collection("settings").doc("banners").onSnapshot((doc) => {
            const list = document.getElementById('banner-list');
            if(doc.exists) {
                const data = doc.data();
                let html = '';
                for(let i=1; i<=6; i++) {
                    if(data[`img${i}`]) html += `<img src="${data[`img${i}`]}" class="banner-img">`;
                }
                list.innerHTML = html || '<p class="text-xs text-gray-400">ব্যানার নেই</p>';
            }
        });

        function copyNumber() {
            const num = document.getElementById('display-number').innerText;
            if(num.includes("লোড") || num.includes("পাওয়া")) return;
            navigator.clipboard.writeText(num).then(() => {
                showToast("✅ রকেট নম্বর কপি হয়েছে!");
            });
        }

        async function sendPayment() {
            const trx = document.getElementById('trx-input').value.trim().toUpperCase();
            const btn = document.getElementById('submit-btn');
            
            if(!trx) return showToast("⚠️ TrxID দিন", true);
            
            btn.disabled = true;
            btn.innerHTML = `<span class="loading-spinner"></span>`;
            
            try {
                const check = await db.collection("payments").where("trxid", "==", trx).get();
                if(!check.empty) {
                    showToast("❌ এই TrxID আগেই ব্যবহৃত হয়েছে", true);
                } else {
                    await db.collection("payments").add({
                        trxid: trx,
                        amount: amount,
                        method: "Rocket",
                        orderId: orderId || "Manual",
                        status: "Pending",
                        time: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    if(orderId && orderId !== "null") {
                        await db.collection("orders").doc(orderId).update({
                            paymentStatus: "Pending",
                            trx: trx
                        }).catch(() => {});
                    }
                    
                    showToast("🎉 পেমেন্ট সাবমিট হয়েছে!");
                    document.getElementById('trx-input').value = "";
                }
            } catch (err) {
                showToast("❌ সমস্যা হয়েছে, চেষ্টা করুন", true);
            }
            btn.disabled = false;
            btn.innerHTML = "পেমেন্ট নিশ্চিত করুন";
        }
    </script>
</body>
                </html>
